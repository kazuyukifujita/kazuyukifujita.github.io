<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>間取りスケッチャー | Precision Design Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', 'Noto Sans JP', sans-serif; 
            touch-action: none;
            overscroll-behavior: none;
            margin: 0;
            background-color: #f1f5f9;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="text-slate-900 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        const UNIT_SIZE_MM = 250;
        const GRID_PIXELS = 15;   
        const SCALE_FACTOR = 0.25; 

        const COLOR_PALETTES = [
            { bg: 'bg-rose-100', border: 'border-rose-400' },
            { bg: 'bg-sky-100', border: 'border-sky-400' },
            { bg: 'bg-teal-100', border: 'border-teal-400' },
            { bg: 'bg-lime-100', border: 'border-lime-400' },
            { bg: 'bg-purple-100', border: 'border-purple-400' },
            { bg: 'bg-pink-100', border: 'border-pink-400' },
            { bg: 'bg-indigo-50', border: 'border-indigo-200' },
        ];

        const ROOM_DATA = [
            { label: 'リビング', defaultW: 20, defaultH: 14, color: 'bg-orange-100 border-orange-300', type: 'room' },
            { label: 'ダイニング', defaultW: 12, defaultH: 12, color: 'bg-amber-50 border-amber-300', type: 'room' },
            { label: 'キッチン', defaultW: 12, defaultH: 8, color: 'bg-yellow-50 border-yellow-200', type: 'room' },
            { label: '玄関', defaultW: 12, defaultH: 12, color: 'bg-stone-100 border-stone-400', type: 'room' },
            { label: 'ワークスペース', defaultW: 8, defaultH: 8, color: 'bg-indigo-100 border-indigo-200', type: 'room' },
            { label: '風呂', defaultW: 8, defaultH: 8, color: 'bg-cyan-50 border-cyan-300', type: 'room' },
            { label: 'トイレ', defaultW: 8, defaultH: 4, color: 'bg-slate-50 border-slate-300', type: 'room' },
            { label: '洗面', defaultW: 8, defaultH: 6, color: 'bg-blue-50 border-blue-200', type: 'room' },
            { label: 'ランドリー', defaultW: 8, defaultH: 8, color: 'bg-emerald-50 border-emerald-200', type: 'room' },
            { label: 'WIC', defaultW: 12, defaultH: 8, color: 'bg-stone-200 border-stone-300', type: 'room' },
            { label: '階段', defaultW: 8, defaultH: 4, color: 'bg-zinc-50 border-zinc-300', type: 'room' },
        ];

        const FURNITURE_DATA = [
            { label: 'ソファー', defaultW: 8, defaultH: 4, color: 'bg-indigo-200 border-indigo-400', type: 'furniture', icon: 'Armchair' },
            { label: '食卓', defaultW: 6, defaultH: 6, color: 'bg-amber-200 border-amber-400', type: 'furniture', icon: 'Utensils' },
            { label: 'テレビ台', defaultW: 8, defaultH: 2, color: 'bg-zinc-300 border-zinc-500', type: 'furniture', icon: 'Tv' },
            { label: 'キッチン設備', defaultW: 10, defaultH: 4, color: 'bg-emerald-200 border-emerald-400', type: 'furniture', icon: 'ChefHat' },
            { label: 'カップボード', defaultW: 8, defaultH: 2, color: 'bg-orange-200 border-orange-400', type: 'furniture', icon: 'Layout' },
        ];

        const SvgIcon = ({ name, size = 18, className = "" }) => {
            const paths = {
                Home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
                Save: <><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>,
                Download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
                Upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>,
                Rotate: <><path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></>,
                Trash: <><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
                Resize: <><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></>,
                Plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                Search: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
                Settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
                FileJson: <><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {paths[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        const App = () => {
            const [elements, setElements] = useState([]);
            const [selectedId, setSelectedId] = useState(null);
            const [baseDraft, setBaseDraft] = useState({ w: 44, h: 28 });
            const [view, setView] = useState({ x: 0, y: 0, scale: 1 });
            const [interactionMode, setInteractionMode] = useState(null);
            const fileInputRef = useRef(null);

            const mainRef = useRef(null);
            const canvasRef = useRef(null);
            const interactionRef = useRef({ 
                startX: 0, startY: 0, initialX: 0, initialY: 0, initialW: 0, initialH: 0, initialViewX: 0, initialViewY: 0, startDist: 0, initialScale: 1
            });

            const mmToGrid = (mm) => Math.max(1, Math.round((Number(mm) || 0) / UNIT_SIZE_MM));
            const gridToMm = (grid) => (Number(grid) || 0) * UNIT_SIZE_MM;

            const calculateArea = (w, h) => {
                const sqm = (w * SCALE_FACTOR * h * SCALE_FACTOR).toFixed(2);
                const tatami = (sqm / 1.62).toFixed(1);
                const mWidth = (w * SCALE_FACTOR).toFixed(2);
                const mHeight = (h * SCALE_FACTOR).toFixed(2);
                return { sqm, tatami, mWidth, mHeight };
            };

            const exportProject = () => {
                if (elements.length === 0) return;
                const data = JSON.stringify({ elements, baseDraft, timestamp: new Date().toISOString() }, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `間取り案_${new Date().toISOString().slice(0,10)}.json`;
                link.click();
                URL.revokeObjectURL(url);
            };

            const importProject = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (parsed.elements) {
                            setElements(parsed.elements);
                            if (parsed.baseDraft) setBaseDraft(parsed.baseDraft);
                            setSelectedId(null);
                            setTimeout(resetView, 100);
                        }
                    } catch (err) {
                        console.error("有効なプロジェクトファイルではありません。");
                    }
                };
                reader.readAsText(file);
                e.target.value = ""; 
            };

            const resetView = useCallback(() => {
                if (!mainRef.current) return;
                const base = elements.find(e => e.type === 'base');
                if (!base) return;
                const padding = 100;
                const availW = mainRef.current.clientWidth - padding;
                const availH = mainRef.current.clientHeight - padding;
                const contentW = (Number(base.w) || 1) * GRID_PIXELS;
                const contentH = (Number(base.h) || 1) * GRID_PIXELS;
                const newScale = Math.min(availW / contentW, availH / contentH, 1.2);
                setView({
                    x: (mainRef.current.clientWidth - contentW * newScale) / 2,
                    y: (mainRef.current.clientHeight - contentH * newScale) / 2,
                    scale: isFinite(newScale) ? newScale : 1
                });
            }, [elements]);

            const addElement = (proto) => {
                const id = Date.now();
                const newEl = {
                    id, label: proto.label, x: 4, y: 4, 
                    w: Number(proto.defaultW) || 4, h: Number(proto.defaultH) || 4,
                    color: proto.color, type: proto.type, rotation: 0, isFixed: proto.type === 'base'
                };

                if (proto.type === 'base') {
                    const initialRooms = ROOM_DATA.map((r, i) => {
                        const coords = [
                            {x:0,y:0}, {x:20,y:0}, {x:32,y:0}, {x:0,y:14}, 
                            {x:12,y:14}, {x:20,y:14}, {x:28,y:14}, {x:36,y:14}, 
                            {x:20,y:22}, {x:32,y:20}, {x:0,y:24}
                        ];
                        return { 
                            ...r, id: id + i + 1, 
                            x: coords[i]?.x ?? 4, y: coords[i]?.y ?? 4, 
                            w: Number(r.defaultW), h: Number(r.defaultH), rotation: 0 
                        };
                    });
                    setElements([{...newEl, x: 0, y: 0, w: Number(baseDraft.w), h: Number(baseDraft.h)}, ...initialRooms]);
                    setTimeout(resetView, 50);
                } else {
                    setElements(prev => [...prev, newEl]);
                }
                setSelectedId(id);
            };

            const addCustomElement = (type) => {
                const name = window.prompt(`${type === 'room' ? '部屋' : '家具'}の名前を入力してください`, '');
                if (!name) return;
                const randomPalette = COLOR_PALETTES[Math.floor(Math.random() * COLOR_PALETTES.length)];
                const proto = {
                    label: name,
                    defaultW: type === 'room' ? 8 : 4,
                    defaultH: type === 'room' ? 8 : 4,
                    color: `${randomPalette.bg} ${randomPalette.border}`,
                    type: type
                };
                addElement(proto);
            };

            const onPointerDown = (e) => {
                const touches = e.nativeEvent instanceof TouchEvent ? e.nativeEvent.touches : null;
                if (touches && touches.length === 2) {
                    const dist = Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
                    interactionRef.current = { ...interactionRef.current, startDist: dist, initialScale: view.scale };
                    setInteractionMode('zoom');
                    return;
                }

                const clientX = e.clientX;
                const clientY = e.clientY;
                const target = e.target.closest('[data-id]');
                const action = e.target.closest('[data-action]')?.dataset.action;

                if (target) {
                    const id = parseInt(target.dataset.id);
                    const el = elements.find(item => item.id === id);
                    if (!el) return;

                    if (el.type === 'base') {
                        setSelectedId(null);
                        setInteractionMode('pan');
                        interactionRef.current = { ...interactionRef.current, startX: clientX, startY: clientY, initialViewX: view.x, initialViewY: view.y };
                        return;
                    }

                    setSelectedId(id);
                    if (action === 'resize') {
                        setInteractionMode('resize');
                        interactionRef.current = { ...interactionRef.current, startX: clientX, startY: clientY, initialW: Number(el.w), initialH: Number(el.h) };
                    } else {
                        setInteractionMode('move');
                        interactionRef.current = { ...interactionRef.current, startX: clientX, startY: clientY, initialX: Number(el.x), initialY: Number(el.y) };
                    }
                } else {
                    setSelectedId(null);
                    setInteractionMode('pan');
                    interactionRef.current = { ...interactionRef.current, startX: clientX, startY: clientY, initialViewX: view.x, initialViewY: view.y };
                }
                e.target.setPointerCapture(e.pointerId);
            };

            const onPointerMove = useCallback((e) => {
                if (!interactionMode) return;
                const touches = e.nativeEvent instanceof TouchEvent ? e.nativeEvent.touches : null;
                
                if (interactionMode === 'zoom' && touches?.length === 2) {
                    const dist = Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
                    const ratio = dist / interactionRef.current.startDist;
                    setView(v => ({ ...v, scale: Math.min(Math.max(interactionRef.current.initialScale * ratio, 0.2), 4) }));
                    return;
                }

                const clientX = e.clientX;
                const clientY = e.clientY;

                if (interactionMode === 'pan') {
                    setView(v => ({
                        ...v,
                        x: interactionRef.current.initialViewX + (clientX - interactionRef.current.startX),
                        y: interactionRef.current.initialViewY + (clientY - interactionRef.current.startY)
                    }));
                } else if (interactionMode === 'move' || interactionMode === 'resize') {
                    const dx_grid = (clientX - interactionRef.current.startX) / (view.scale * GRID_PIXELS);
                    const dy_grid = (clientY - interactionRef.current.startY) / (view.scale * GRID_PIXELS);

                    setElements(prev => prev.map(el => {
                        if (el.id !== selectedId) return el;
                        if (interactionMode === 'move') {
                            return { ...el, x: Math.round(interactionRef.current.initialX + dx_grid), y: Math.round(interactionRef.current.initialY + dy_grid) };
                        } else {
                            return { ...el, w: Math.max(1, Math.round(interactionRef.current.initialW + dx_grid)), h: Math.max(1, Math.round(interactionRef.current.initialH + dy_grid)) };
                        }
                    }));
                }
            }, [interactionMode, selectedId, view.scale]);

            const onPointerUp = (e) => {
                setInteractionMode(null);
                if (e.target.hasPointerCapture(e.pointerId)) e.target.releasePointerCapture(e.pointerId);
            };

            const exportPNG = async () => {
                if (!canvasRef.current || !window.html2canvas) return;
                const capture = await html2canvas(canvasRef.current, { scale: 2, backgroundColor: "#ffffff" });
                const link = document.createElement('a');
                link.download = 'floor_plan.png';
                link.href = capture.toDataURL();
                link.click();
            };

            const sortedElements = useMemo(() => {
                const order = { 'base': 0, 'room': 1, 'furniture': 2 };
                return [...elements].sort((a, b) => order[a.type] - order[b.type]);
            }, [elements]);

            const selectedEl = elements.find(e => e.id === selectedId);
            const baseEl = elements.find(e => e.type === 'base');

            return (
                <div className="flex flex-col h-screen bg-slate-100 overflow-hidden font-sans select-none text-slate-900">
                    <header className="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center z-50 shrink-0 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-lg"><SvgIcon name="Home" size={22} /></div>
                            <div>
                                <h1 className="text-lg font-bold leading-tight">間取りスケッチャー</h1>
                                <p className="text-[10px] text-indigo-500 font-black uppercase tracking-tighter">Project Share Edition</p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <input type="file" ref={fileInputRef} onChange={importProject} accept=".json" className="hidden" />
                            <button onClick={() => fileInputRef.current.click()} className="bg-white border border-slate-200 px-4 py-2 rounded-xl flex items-center gap-2 text-xs font-bold hover:bg-slate-50 transition-all">
                                <SvgIcon name="Upload" size={16}/><span>開く</span>
                            </button>
                            <button onClick={exportProject} className="bg-white border border-slate-200 px-4 py-2 rounded-xl flex items-center gap-2 text-xs font-bold hover:bg-slate-50 transition-all">
                                <SvgIcon name="FileJson" size={16}/><span>プロジェクト保存</span>
                            </button>
                            <button onClick={exportPNG} className="bg-slate-900 text-white px-5 py-2 rounded-xl flex items-center gap-2 text-xs font-black hover:bg-slate-800 shadow-lg transition-all">
                                <SvgIcon name="Download" size={16}/><span>PNG出力</span>
                            </button>
                        </div>
                    </header>

                    <div className="flex flex-1 overflow-hidden relative">
                        {/* Sidebar */}
                        <aside className="w-16 sm:w-64 bg-white border-r border-slate-200 flex flex-col overflow-y-auto p-2 sm:p-5 space-y-6 scrollbar-hide z-40 shrink-0 shadow-xl">
                            {!baseEl ? (
                                <section className="space-y-4 pt-2">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">家のサイズを決定</h3>
                                    <div className="space-y-4 text-left">
                                        <div><label className="text-[9px] font-black text-slate-400 block mb-1">幅 (mm)</label><input type="number" step="250" value={gridToMm(baseDraft.w)} onChange={(e) => setBaseDraft({...baseDraft, w: mmToGrid(e.target.value)})} className="w-full p-3 border rounded-xl outline-none focus:ring-4 ring-indigo-50 font-bold text-lg"/></div>
                                        <div><label className="text-[9px] font-black text-slate-400 block mb-1">奥行 (mm)</label><input type="number" step="250" value={gridToMm(baseDraft.h)} onChange={(e) => setBaseDraft({...baseDraft, h: mmToGrid(e.target.value)})} className="w-full p-3 border rounded-xl outline-none focus:ring-4 ring-indigo-50 font-bold text-lg"/></div>
                                        <button onClick={() => addElement({ label: '家の外形', defaultW: baseDraft.w, defaultH: baseDraft.h, color: 'bg-white/50 border-slate-300 border-2 border-dashed', type: 'base' })} className="w-full py-4 bg-indigo-600 text-white rounded-xl font-black text-[11px] uppercase shadow-xl hover:bg-indigo-700 active:scale-95 transition-all mt-2 tracking-widest">確定して配置</button>
                                    </div>
                                </section>
                            ) : (
                                <div className="space-y-6">
                                    <section className="p-4 bg-slate-50 border border-slate-200 rounded-2xl space-y-3 shadow-inner">
                                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2"><SvgIcon name="Settings" size={14}/> {selectedId && selectedEl.type !== 'base' ? 'パーツ微調整' : '家の外寸微調整'}</h3>
                                        <div className="grid grid-cols-1 gap-2">
                                            <div className="space-y-1">
                                                <label className="text-[9px] font-black text-slate-500 uppercase">幅 (mm)</label>
                                                <input type="number" step="250" value={selectedId ? gridToMm(selectedEl.w) : gridToMm(baseEl.w)} onChange={(e) => {
                                                    const mm = parseInt(e.target.value) || 250;
                                                    const targetId = selectedId || baseEl.id;
                                                    setElements(prev => prev.map(el => el.id === targetId ? {...el, w: mmToGrid(mm)} : el));
                                                }} className="w-full p-2 text-sm border rounded-lg bg-white font-bold outline-none focus:ring-2 ring-indigo-200"/>
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[9px] font-black text-slate-500 uppercase">奥行 (mm)</label>
                                                <input type="number" step="250" value={selectedId ? gridToMm(selectedEl.h) : gridToMm(baseEl.h)} onChange={(e) => {
                                                    const mm = parseInt(e.target.value) || 250;
                                                    const targetId = selectedId || baseEl.id;
                                                    setElements(prev => prev.map(el => el.id === targetId ? {...el, h: mmToGrid(mm)} : el));
                                                }} className="w-full p-2 text-sm border rounded-lg bg-white font-bold outline-none focus:ring-2 ring-indigo-200"/>
                                            </div>
                                        </div>
                                    </section>
                                    <section className="space-y-4">
                                        <h3 className="hidden sm:block text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">部屋を追加</h3>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                            {ROOM_DATA.map(r => (
                                                <button key={r.label} onClick={() => addElement(r)} className="flex flex-col items-center p-2 rounded-xl border border-slate-50 bg-slate-50 hover:border-indigo-200 transition-all group shadow-sm">
                                                    <div className={`w-full h-4 sm:h-7 rounded-lg ${r.color.split(' ')[0]} border ${r.color.split(' ')[1]}`} />
                                                    <span className="text-[9px] font-black text-slate-600 mt-2 truncate w-full text-center uppercase tracking-tighter">{r.label}</span>
                                                </button>
                                            ))}
                                            <button onClick={() => addCustomElement('room')} className="flex flex-col items-center justify-center p-2 rounded-xl border-2 border-dashed border-slate-200 bg-white hover:border-indigo-300 hover:text-indigo-600 transition-all group shadow-sm min-h-[50px]">
                                                <SvgIcon name="Plus" size={20} className="text-slate-400 group-hover:text-indigo-600" />
                                                <span className="text-[8px] font-black text-slate-400 mt-1 uppercase">カスタム部屋</span>
                                            </button>
                                        </div>
                                    </section>
                                    <section className="space-y-4">
                                        <h3 className="hidden sm:block text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">家具を配置</h3>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                            {FURNITURE_DATA.map(f => (
                                                <button key={f.label} onClick={() => addElement(f)} className="flex flex-col items-center p-2 rounded-xl border border-slate-50 bg-slate-50 hover:border-indigo-200 transition-all group shadow-sm">
                                                    <span className="hidden sm:inline text-[9px] font-black text-slate-600 mt-2 group-hover:text-indigo-600 uppercase tracking-tighter">{f.label}</span>
                                                </button>
                                            ))}
                                            <button onClick={() => addCustomElement('furniture')} className="flex flex-col items-center justify-center p-2 rounded-xl border-2 border-dashed border-slate-200 bg-white hover:border-indigo-300 hover:text-indigo-600 transition-all group shadow-sm min-h-[50px]">
                                                <SvgIcon name="Plus" size={20} className="text-slate-400 group-hover:text-indigo-600" />
                                                <span className="text-[8px] font-black text-slate-400 mt-1 uppercase">カスタム家具</span>
                                            </button>
                                        </div>
                                    </section>
                                </div>
                            )}
                        </aside>

                        {/* Main Canvas Area */}
                        <main ref={mainRef} className="flex-1 bg-slate-200 relative overflow-hidden touch-none" onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp}>
                            {baseEl ? (
                                <div ref={canvasRef} className="absolute inset-0 pointer-events-none transition-transform duration-75 ease-out origin-top-left" style={{ transform: `translate(${view.x}px, ${view.y}px) scale(${view.scale})` }}>
                                    {/* グリッド全域表示 */}
                                    <div className="absolute top-[-6000px] left-[-6000px] w-[12000px] h-[12000px] bg-white shadow-2xl" style={{
                                        backgroundImage: `
                                            linear-gradient(to right, #f1f5f9 1px, transparent 1px), linear-gradient(to bottom, #f1f5f9 1px, transparent 1px),
                                            linear-gradient(to right, #e2e8f0 1.5px, transparent 1.5px), linear-gradient(to bottom, #e2e8f0 1.5px, transparent 1.5px)
                                        `,
                                        backgroundSize: `${GRID_PIXELS * 2}px ${GRID_PIXELS * 2}px, ${GRID_PIXELS * 2}px ${GRID_PIXELS * 2}px, ${GRID_PIXELS * 4}px ${GRID_PIXELS * 4}px, ${GRID_PIXELS * 4}px ${GRID_PIXELS * 4}px`
                                    }} />
                                    
                                    <div className="relative">
                                        {sortedElements.map(el => {
                                            const isSelected = selectedId === el.id;
                                            const { sqm, tatami, mWidth, mHeight } = calculateArea(el.w, el.h);
                                            const isBase = el.type === 'base';

                                            return (
                                                <div key={el.id} data-id={el.id} className={`absolute flex flex-col items-center justify-center border-2 transition-all
                                                    ${el.color} ${isBase ? 'pointer-events-none border-dashed border-slate-300 shadow-2xl bg-white/80' : 'pointer-events-auto cursor-move border-opacity-50'}
                                                    ${isSelected ? 'ring-2 ring-indigo-500 ring-offset-4 z-40 shadow-2xl scale-[1.01]' : 'z-10 shadow-sm'}
                                                    ${el.type === 'furniture' ? 'rounded-2xl opacity-90' : 'rounded-sm'}`}
                                                    style={{ 
                                                        left: (Number(el.x) || 0) * GRID_PIXELS, 
                                                        top: (Number(el.y) || 0) * GRID_PIXELS, 
                                                        width: (Number(el.w) || 1) * GRID_PIXELS, 
                                                        height: (Number(el.h) || 1) * GRID_PIXELS, 
                                                        transform: `rotate(${el.rotation}deg)` 
                                                    }}
                                                >
                                                    {!isBase && (
                                                        <div className="text-center p-1 pointer-events-none w-full overflow-hidden">
                                                            <span className="font-black text-slate-800 text-[11px] leading-none block">
                                                                {el.label}
                                                            </span>
                                                            {el.type === 'room' && (
                                                                <div className="mt-1 space-y-0.5">
                                                                    <span className="text-[9px] text-slate-500 block font-black uppercase tracking-tighter leading-none">{tatami}畳 / {sqm}㎡</span>
                                                                    <span className="text-[8px] text-indigo-400 block font-black leading-none">{mWidth}m × {mHeight}m</span>
                                                                </div>
                                                            )}
                                                        </div>
                                                    )}

                                                    {isSelected && !isBase && (
                                                        <div className="pointer-events-auto">
                                                            <div className="absolute -top-5 -right-5 sm:-top-4 sm:-right-4 w-10 h-10 sm:w-8 sm:h-8 bg-white border border-slate-100 rounded-full flex items-center justify-center shadow-2xl text-indigo-600 active:scale-75 transition-transform"
                                                                onClick={(e) => { e.stopPropagation(); setElements(prev => prev.map(item => item.id === el.id ? {...item, rotation: (item.rotation + 90) % 360} : item)); }}
                                                            >
                                                                <SvgIcon name="Rotate" size={18} className="sm:w-4 sm:h-4" />
                                                            </div>
                                                            {el.type === 'room' && (
                                                                <div className="absolute -bottom-6 -right-6 sm:-bottom-5 sm:-right-5 w-12 h-12 sm:w-10 sm:h-10 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-2xl border-2 border-white cursor-nwse-resize z-50 active:scale-90 transition-transform touch-none" data-action="resize">
                                                                    <SvgIcon name="Resize" size={24} className="sm:w-5 sm:h-5" />
                                                                </div>
                                                            )}
                                                            <div className="absolute -top-5 -left-5 sm:-top-4 sm:-left-4 w-10 h-10 sm:w-8 sm:h-8 bg-white border border-slate-100 rounded-full flex items-center justify-center shadow-2xl text-red-500 active:scale-75 transition-transform"
                                                                onClick={(e) => { e.stopPropagation(); setElements(prev => prev.filter(item => item.id !== el.id)); setSelectedId(null); }}
                                                            >
                                                                <SvgIcon name="Trash" size={18} className="sm:w-4 sm:h-4" />
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ) : (
                                <div className="flex flex-col items-center justify-center h-full text-slate-300">
                                    <SvgIcon name="Home" size={100} className="mb-4 opacity-5 animate-pulse" />
                                    <p className="font-black text-sm uppercase tracking-widest text-slate-400">家の外形を入力して開始</p>
                                </div>
                            )}

                            {/* View Navigation */}
                            <div className="absolute bottom-10 right-10 flex flex-col gap-5 z-50 no-print">
                                <button onClick={resetView} className="w-16 h-16 bg-white rounded-full shadow-2xl flex items-center justify-center text-indigo-600 active:bg-indigo-50 border border-slate-100 transition-all hover:scale-110 active:scale-90">
                                    <SvgIcon name="Search" size={32} />
                                </button>
                                <div className="bg-white rounded-[2.5rem] shadow-2xl flex flex-col border border-slate-100 overflow-hidden">
                                    <button onClick={() => setView(v => ({...v, scale: Math.min(v.scale * 1.2, 4)}))} className="w-16 h-16 flex items-center justify-center font-black text-3xl active:bg-slate-50 border-b-2 border-slate-50">+</button>
                                    <button onClick={() => setView(v => ({...v, scale: Math.max(v.scale * 0.8, 0.2)}))} className="w-16 h-16 flex items-center justify-center font-black text-3xl active:bg-slate-50">-</button>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
