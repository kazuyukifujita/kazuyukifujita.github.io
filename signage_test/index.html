<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>雲のコメントサイネージ</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="sky">
    <div id="stars"></div>
    <div id="bg-clouds"></div>
    <div id="horizon-glow"></div>
  </div>

  <header id="hint">気持ちを言葉にして、空に浮かべよう</header>

  <main id="cloud-layer" aria-live="polite"></main>

  <p id="empty-state">まだコメントがありません。<br />下の入力欄から最初のひとことを送ってみましょう。</p>

  <footer id="input-bar">
    <button id="mic-btn" type="button" aria-label="音声入力">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="12" rx="3"></rect>
        <path d="M5 10a7 7 0 0 0 14 0"></path>
        <line x1="12" y1="19" x2="12" y2="22"></line>
      </svg>
    </button>
    <input id="comment-input" type="text" maxlength="140" placeholder="コメントを入力…" autocomplete="off" />
    <button id="send-btn" type="button" aria-label="送信">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="12" x2="20" y2="12"></line>
        <polyline points="14 6 20 12 14 18"></polyline>
      </svg>
    </button>
  </footer>

  <div id="toast" class="hidden"></div>

  <!-- スレッド表示モーダル -->
  <div id="thread-modal" class="modal-overlay hidden">
    <div class="modal-card thread-card">
      <button class="modal-close" id="thread-close" aria-label="閉じる">×</button>
      <div class="thread-root">
        <p id="thread-root-text"></p>
        <div class="thread-root-meta">
          <span id="thread-root-time" class="thread-time"></span>
          <div class="thread-root-actions">
            <button id="thread-root-like" class="thread-root-like-btn" type="button" aria-label="いいね">
              🤍 <span id="thread-root-like-count">0</span>
            </button>
            <button id="thread-root-delete" class="thread-root-delete-btn" type="button">元コメントを削除</button>
          </div>
        </div>
      </div>
      <div id="thread-replies" class="thread-replies"></div>
      <div class="thread-reply-bar">
        <button id="thread-mic-btn" type="button" aria-label="音声入力">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="12" rx="3"></rect>
            <path d="M5 10a7 7 0 0 0 14 0"></path>
            <line x1="12" y1="19" x2="12" y2="22"></line>
          </svg>
        </button>
        <input id="thread-reply-input" type="text" maxlength="140" placeholder="返信を入力…" autocomplete="off" />
        <button id="thread-reply-send" type="button" aria-label="返信を送信">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="12" x2="20" y2="12"></line>
            <polyline points="14 6 20 12 14 18"></polyline>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- 削除確認モーダル -->
  <div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal-card confirm-card">
      <p id="confirm-message">このコメントを削除しますか？</p>
      <div class="confirm-actions">
        <button id="confirm-cancel" class="btn-ghost">キャンセル</button>
        <button id="confirm-ok" class="btn-danger">削除する</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
