<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>間取り & 家具スケッチャー - メーターモジュール版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .layer-site { z-index: 1; }
        .layer-room { z-index: 10; }
        .layer-furniture { z-index: 20; }
        .layer-ui { z-index: 50; }
        @media print { .layer-ui, aside, header, .fixed { display: none !important; } .flex-1 { overflow: visible !important; } body { background: white; } }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        const GRID_SIZE = 25; // 1マスあたりのピクセル数
        const SCALE_FACTOR = 0.5; // 1グリッド = 500mm (0.5m) : メーターモジュール

        // 部屋の初期データセット（メーターモジュール基準）
        const ROOM_TYPES = [
            { label: 'リビング', defaultW: 8, defaultH: 8, color: 'bg-orange-100 border-orange-400', type: 'room' }, // 4m x 4m
            { label: 'DK', defaultW: 8, defaultH: 6, color: 'bg-yellow-50 border-yellow-400', type: 'room' },    // 4m x 3m
            { label: 'ワークスペース', defaultW: 4, defaultH: 4, color: 'bg-indigo-100 border-indigo-300', type: 'room' }, // 2m x 2m
            { label: '浴室', defaultW: 4, defaultH: 4, color: 'bg-cyan-100 border-cyan-400', type: 'room' },    // 2m x 2m
            { label: 'トイレ', defaultW: 2, defaultH: 3, color: 'bg-slate-100 border-slate-400', type: 'room' }, // 1m x 1.5m
            { label: '洗面', defaultW: 4, defaultH: 3, color: 'bg-blue-50 border-blue-300', type: 'room' },     // 2m x 1.5m
            { label: 'ランドリー', defaultW: 4, defaultH: 4, color: 'bg-emerald-50 border-emerald-300', type: 'room' }, // 2m x 2m
            { label: '収納', defaultW: 2, defaultH: 4, color: 'bg-stone-100 border-stone-300', type: 'room' },  // 1m x 2m
        ];

        // 家具の初期データセット（メーターモジュール基準）
        const FURNITURE_TYPES = [
            { label: 'ソファー', defaultW: 4, defaultH: 2, color: 'bg-indigo-200 border-indigo-500', type: 'furniture', icon: 'Armchair' }, // 2m x 1m
            { label: '食卓', defaultW: 3, defaultH: 3, color: 'bg-amber-200 border-amber-500', type: 'furniture', icon: 'Utensils' }, // 1.5m x 1.5m
            { label: 'テレビ台', defaultW: 4, defaultH: 1, color: 'bg-zinc-300 border-zinc-600', type: 'furniture', icon: 'Tv' }, // 2m x 0.5m
            { label: 'キッチン', defaultW: 5, defaultH: 2, color: 'bg-emerald-200 border-emerald-500', type: 'furniture', icon: 'ChefHat' }, // 2.5m x 1m
            { label: 'カップボード', defaultW: 4, defaultH: 1, color: 'bg-orange-200 border-orange-500', type: 'furniture', icon: 'Layout' }, // 2m x 0.5m
        ];

        const COLOR_PALETTES = [
            { bg: 'bg-rose-100', border: 'border-rose-400' },
            { bg: 'bg-sky-100', border: 'border-sky-400' },
            { bg: 'bg-teal-100', border: 'border-teal-400' },
            { bg: 'bg-lime-100', border: 'border-lime-400' },
            { bg: 'bg-amber-100', border: 'border-amber-400' },
        ];

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
                Plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                RotateCcw: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></>,
                RotateCw: <><path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></>,
                Trash2: <><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
                Info: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>,
                Layout: <><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></>,
                Armchair: <><path d="M19 9V6a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v3"/><path d="M3 11v5a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2Z"/><path d="M5 18v2"/><path d="M19 18v2"/></>,
                Utensils: <><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></>,
                Tv: <><rect width="20" height="15" x="2" y="3" rx="2"/><polyline points="17 2 12 7 7 2"/></>,
                ChefHat: <><path d="M17 18a2 2 0 0 0 2-2c0-1.5-1.5-2.5-1.5-2.5a5 5 0 1 0-11 0c0 .5-1.5 1-1.5 2.5a2 2 0 0 0 2 2"/><line x1="6" y1="18" x2="18" y2="18"/><line x1="6" y1="22" x2="18" y2="22"/></>,
                Maximize2: <><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></>,
                Download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
                Map: <><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || icons.Info}
                </svg>
            );
        };

        const App = () => {
            const [elements, setElements] = useState([]);
            const [selectedId, setSelectedId] = useState(null);
            const [customName, setCustomName] = useState('');
            const [isDragging, setIsDragging] = useState(false);
            const [isResizing, setIsResizing] = useState(false);
            const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
            const canvasRef = useRef(null);

            const calculateArea = (w, h) => {
                const sqm = (w * SCALE_FACTOR * h * SCALE_FACTOR).toFixed(2);
                const tatami = (sqm / 1.62).toFixed(1); // 不動産基準
                const tsubo = (sqm * 0.3025).toFixed(1);
                return { sqm, tatami, tsubo };
            };

            const gridToMm = (val) => Math.round(val * 500); // メーターモジュール基準
            const mmToGrid = (mm) => Math.max(1, Math.round(mm / 500));

            const addElement = (proto, isCustom = false) => {
                let colorClass = proto.color;
                if (isCustom) {
                    const randomColor = COLOR_PALETTES[Math.floor(Math.random() * COLOR_PALETTES.length)];
                    colorClass = `${randomColor.bg} ${randomColor.border}`;
                }

                const newElement = {
                    id: Date.now(),
                    label: isCustom ? customName || (proto.type === 'site' ? '敷地' : proto.type === 'room' ? '新規部屋' : '新規家具') : proto.label,
                    x: proto.type === 'site' ? 2 : 10,
                    y: proto.type === 'site' ? 2 : 10,
                    w: proto.defaultW || 4,
                    h: proto.defaultH || 4,
                    color: colorClass || 'bg-slate-100 border-slate-400',
                    type: proto.type,
                    rotation: 0,
                };

                if (proto.type === 'site' && elements.some(el => el.type === 'site')) return;

                setElements([...elements, newElement]);
                setSelectedId(newElement.id);
                if (isCustom) setCustomName('');
            };

            const handleMouseDown = (e, element, action) => {
                e.stopPropagation();
                setSelectedId(element.id);
                const rect = e.currentTarget.getBoundingClientRect();
                if (action === 'move') {
                    setIsDragging(true);
                    setDragOffset({ x: e.clientX - rect.left, y: e.clientY - rect.top });
                } else if (action === 'resize') {
                    setIsResizing(true);
                }
            };

            const handleMouseMove = useCallback((e) => {
                if (!isDragging && !isResizing) return;
                const canvasRect = canvasRef.current.getBoundingClientRect();
                const rawX = e.clientX - canvasRect.left;
                const rawY = e.clientY - canvasRect.top;

                setElements(prev => prev.map(el => {
                    if (el.id !== selectedId) return el;
                    if (isDragging) {
                        return {
                            ...el,
                            x: Math.max(0, Math.round((rawX - dragOffset.x) / GRID_SIZE)),
                            y: Math.max(0, Math.round((rawY - dragOffset.y) / GRID_SIZE)),
                        };
                    }
                    if (isResizing) {
                        return {
                            ...el,
                            w: Math.max(1, Math.round((rawX - el.x * GRID_SIZE) / GRID_SIZE)),
                            h: Math.max(1, Math.round((rawY - el.y * GRID_SIZE) / GRID_SIZE)),
                        };
                    }
                    return el;
                }));
            }, [isDragging, isResizing, selectedId, dragOffset]);

            const handleMouseUp = () => {
                setIsDragging(false);
                setIsResizing(false);
            };

            useEffect(() => {
                window.addEventListener('mousemove', handleMouseMove);
                window.addEventListener('mouseup', handleMouseUp);
                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mouseup', handleMouseUp);
                };
            }, [handleMouseMove]);

            const stats = useMemo(() => {
                const site = elements.find(el => el.type === 'site');
                const siteArea = site ? parseFloat(calculateArea(site.w, site.h).sqm) : 0;
                const floorArea = elements
                    .filter(el => el.type === 'room')
                    .reduce((acc, el) => acc + parseFloat(calculateArea(el.w, el.h).sqm), 0);
                const coverageRatio = siteArea > 0 ? ((floorArea / siteArea) * 100).toFixed(1) : 0;
                return { siteArea, floorArea, coverageRatio };
            }, [elements]);

            const sortedElements = [...elements].sort((a, b) => {
                const order = { 'site': 0, 'room': 1, 'furniture': 2 };
                return order[a.type] - order[b.type];
            });

            return (
                <div className="flex flex-col h-screen bg-slate-100 overflow-hidden">
                    <header className="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center z-50 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-lg"><Icon name="Home" size={24} /></div>
                            <div>
                                <h1 className="text-lg font-bold leading-tight">間取りスケッチャー</h1>
                                <p className="text-[10px] text-slate-400 font-medium uppercase tracking-widest">Meter Module Edition</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-8">
                            <div className="flex gap-6 border-r pr-6 border-slate-200">
                                <div className="text-right">
                                    <span className="block text-[10px] font-bold text-slate-400">敷地面積</span>
                                    <span className="text-xl font-black">{stats.siteArea.toFixed(1)} <small className="text-xs font-normal">㎡</small></span>
                                </div>
                                <div className="text-right">
                                    <span className="block text-[10px] font-bold text-indigo-400">延床面積</span>
                                    <span className="text-xl font-black text-indigo-600">{stats.floorArea.toFixed(1)} <small className="text-xs font-normal">㎡</small></span>
                                </div>
                                <div className="text-right">
                                    <span className="block text-[10px] font-bold text-rose-400">建ぺい率(目安)</span>
                                    <span className="text-xl font-black text-rose-500">{stats.coverageRatio}%</span>
                                </div>
                            </div>
                            <button onClick={() => setElements([])} className="p-2 text-slate-400 hover:text-red-500 transition-colors"><Icon name="RotateCcw" /></button>
                        </div>
                    </header>

                    <div className="flex flex-1 overflow-hidden">
                        {/* Sidebar */}
                        <aside className="w-80 bg-white border-r border-slate-200 flex flex-col overflow-y-auto p-5 space-y-6 scrollbar-hide">
                            <section className="bg-slate-50 p-4 rounded-2xl border border-slate-200">
                                <h3 className="text-xs font-bold text-slate-500 mb-3 flex items-center gap-2"><Icon name="Plus" size={14} /> 自由に追加</h3>
                                <input type="text" placeholder="パーツ名を入力" value={customName} onChange={(e) => setCustomName(e.target.value)} className="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 mb-3 outline-none focus:ring-2 ring-indigo-300"/>
                                <div className="grid grid-cols-2 gap-2">
                                    <button onClick={() => addElement({ type: 'room', defaultW: 4, defaultH: 4 }, true)} className="bg-white border border-slate-200 hover:bg-indigo-50 py-2 rounded-lg text-[10px] font-black uppercase transition-all">部屋として</button>
                                    <button onClick={() => addElement({ type: 'furniture', defaultW: 2, defaultH: 2 }, true)} className="bg-white border border-slate-200 hover:bg-indigo-50 py-2 rounded-lg text-[10px] font-black uppercase transition-all">家具として</button>
                                </div>
                            </section>

                            {!elements.some(el => el.type === 'site') && (
                                <button onClick={() => addElement({ type: 'site', defaultW: 20, defaultH: 20, color: 'bg-slate-200/50 border-slate-300 border-dashed' })} className="w-full flex items-center justify-center gap-2 p-4 rounded-xl border-2 border-dashed border-slate-200 bg-slate-50 hover:bg-indigo-50 text-slate-500 font-bold transition-all"><Icon name="Map" /> 敷地を定義 (10m x 10m)</button>
                            )}

                            {selectedId && elements.filter(el => el.id === selectedId).map(el => (
                                <section key={el.id} className="p-4 bg-indigo-50 rounded-2xl border border-indigo-100 space-y-4 shadow-sm animate-in fade-in slide-in-from-bottom-1">
                                    <h3 className="text-xs font-bold text-indigo-900 flex items-center gap-2"><Icon name="Info" size={14} /> 編集: {el.label}</h3>
                                    <input type="text" value={el.label} onChange={(e) => setElements(elements.map(item => item.id === el.id ? {...item, label: e.target.value} : item))} className="w-full text-sm font-bold bg-white rounded-lg px-3 py-2 outline-none"/>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div><label className="text-[10px] font-bold text-indigo-400 block mb-1">幅 (mm)</label>
                                            <input type="number" step="500" value={gridToMm(el.w)} onChange={(e) => setElements(elements.map(item => item.id === el.id ? {...item, w: mmToGrid(parseInt(e.target.value) || 500)} : item))} className="w-full text-sm font-bold bg-white rounded-lg px-3 py-2 outline-none"/>
                                        </div>
                                        <div><label className="text-[10px] font-bold text-indigo-400 block mb-1">奥行 (mm)</label>
                                            <input type="number" step="500" value={gridToMm(el.h)} onChange={(e) => setElements(elements.map(item => item.id === el.id ? {...item, h: mmToGrid(parseInt(e.target.value) || 500)} : item))} className="w-full text-sm font-bold bg-white rounded-lg px-3 py-2 outline-none"/>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <button onClick={() => setElements(elements.map(item => item.id === el.id ? {...item, rotation: (item.rotation + 90) % 360} : item))} className="p-2 bg-white border border-indigo-200 rounded-lg hover:bg-indigo-600 hover:text-white transition-all flex items-center justify-center gap-1 text-[10px] font-bold text-indigo-600"><Icon name="RotateCw" size={14}/> 90°回転</button>
                                        <button onClick={() => { setElements(elements.filter(item => item.id !== el.id)); setSelectedId(null); }} className="p-2 bg-white border border-red-100 rounded-lg hover:bg-red-500 hover:text-white transition-all flex items-center justify-center gap-1 text-[10px] font-bold text-red-500"><Icon name="Trash2" size={14}/> 削除</button>
                                    </div>
                                </section>
                            ))}

                            <section>
                                <h3 className="text-xs font-bold text-slate-400 mb-3 px-1 uppercase tracking-widest">部屋パーツ</h3>
                                <div className="grid grid-cols-2 gap-2">
                                    {ROOM_TYPES.map(type => (
                                        <button key={type.label} onClick={() => addElement(type)} className="flex flex-col items-center gap-1 p-2 rounded-xl border border-slate-100 bg-slate-50 hover:border-indigo-300 transition-all">
                                            <div className={`w-full h-8 rounded-md ${type.color.split(' ')[0]} border ${type.color.split(' ')[1]}`} />
                                            <span className="text-[10px] font-bold text-slate-600">{type.label}</span>
                                        </button>
                                    ))}
                                </div>
                            </section>

                            <section>
                                <h3 className="text-xs font-bold text-slate-400 mb-3 px-1 uppercase tracking-widest">家具・設備</h3>
                                <div className="grid grid-cols-2 gap-2">
                                    {FURNITURE_TYPES.map(type => (
                                        <button key={type.label} onClick={() => addElement(type)} className="flex items-center gap-2 p-2 rounded-xl border border-slate-100 bg-slate-50 hover:border-indigo-300 transition-all text-left">
                                            <Icon name={type.icon} size={14} className="text-slate-400" />
                                            <span className="text-[10px] font-bold text-slate-600">{type.label}</span>
                                        </button>
                                    ))}
                                </div>
                            </section>
                            <div className="pt-4 border-t border-slate-100 text-[10px] text-slate-400 italic">
                                ※ メーターモジュール基準 (1マス=0.5m)<br/>
                                ※ 1.62㎡ = 1畳で計算しています。
                            </div>
                        </aside>

                        {/* Main Canvas */}
                        <main className="flex-1 relative overflow-auto p-8 bg-slate-100 scrollbar-hide">
                            <div 
                                ref={canvasRef}
                                className="relative bg-white shadow-2xl rounded-sm overflow-hidden w-full transition-all"
                                style={{ 
                                    minHeight: '2000px',
                                    backgroundImage: 'linear-gradient(#f1f5f9 1px, transparent 1px), linear-gradient(90deg, #f1f5f9 1px, transparent 1px)',
                                    backgroundSize: `${GRID_SIZE}px ${GRID_SIZE}px`
                                }}
                                onMouseDown={() => setSelectedId(null)}
                            >
                                {sortedElements.map(el => {
                                    const isSelected = selectedId === el.id;
                                    const { sqm, tatami, tsubo } = calculateArea(el.w, el.h);
                                    const layerClass = el.type === 'site' ? 'layer-site' : el.type === 'room' ? 'layer-room' : 'layer-furniture';
                                    const borderStyle = el.type === 'site' ? 'border-4 border-dashed' : 'border-2';

                                    return (
                                        <div
                                            key={el.id}
                                            onMouseDown={(e) => handleMouseDown(e, el, 'move')}
                                            className={`absolute ${borderStyle} transition-all flex flex-col items-center justify-center ${el.color} ${layerClass} ${isSelected ? 'ring-4 ring-indigo-500 ring-offset-2 shadow-2xl cursor-move z-40' : 'cursor-pointer'} ${el.type === 'furniture' ? 'rounded-md opacity-90' : ''}`}
                                            style={{ left: el.x * GRID_SIZE, top: el.y * GRID_SIZE, width: el.w * GRID_SIZE, height: el.h * GRID_SIZE, transform: `rotate(${el.rotation}deg)` }}
                                        >
                                            <div className="p-1 text-center pointer-events-none select-none overflow-hidden w-full">
                                                <span className={`font-black text-slate-800 leading-tight block uppercase truncate ${el.type === 'site' ? 'text-lg text-slate-300' : el.type === 'furniture' ? 'text-[9px]' : 'text-[11px]'}`}>{el.label}</span>
                                                {el.type !== 'furniture' && (
                                                    <span className="text-[9px] font-bold text-slate-500 opacity-60 block truncate">
                                                        {sqm}㎡ / {tsubo}坪 {el.type === 'room' && `(${tatami}J)`}
                                                    </span>
                                                )}
                                            </div>
                                            {isSelected && (
                                                <div className="layer-ui">
                                                    <div className="absolute -top-3 -right-3 w-6 h-6 bg-white border border-indigo-200 text-indigo-600 rounded-full flex items-center justify-center shadow-lg hover:bg-indigo-600 hover:text-white cursor-pointer" onClick={(e) => { e.stopPropagation(); setElements(elements.map(item => item.id === el.id ? {...item, rotation: (item.rotation + 90) % 360} : item)); }}>
                                                        <Icon name="RotateCw" size={14} />
                                                    </div>
                                                    {el.type !== 'furniture' && (
                                                        <div onMouseDown={(e) => handleMouseDown(e, el, 'resize')} className="absolute -bottom-2 -right-2 w-5 h-5 cursor-nwse-resize bg-indigo-600 text-white rounded-full flex items-center justify-center border-2 border-white">
                                                            <Icon name="Maximize2" size={10} />
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </main>
                    </div>

                    <div className="fixed bottom-8 right-8 layer-ui">
                        <button onClick={() => window.print()} className="flex items-center gap-2 bg-slate-900 text-white px-8 py-4 rounded-full font-bold shadow-2xl hover:bg-indigo-600 transition-all active:scale-95 group">
                            <Icon name="Download" size={20} className="group-hover:translate-y-0.5" />
                            <span>PDFで保存/印刷</span>
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
